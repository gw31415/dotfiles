[[plugins]]
repo = "A7Lavinraj/fyler.nvim@stable"
depends = "mini.icons"
on_cmd = "Fyler"
on_map = { n = '<c-n>' }
lua_after = '''
require 'fyler'.setup {
	extensions = { trash = { enabled = true } },
	integrations = { icon = 'mini_icons' },
	mappings = {
		n = {
			-- システムデフォルトアプリで開く
			gx = {
				action = function(finder)
					local entry = require('fyler.finder').parse_cursor_line(finder)
					if entry then vim.ui.open(entry.path) end
				end,
			},
			-- 開く（ディレクトリなら展開切替）
			["<CR>"] = { action = 'select', args = { close = true } },
			-- 閉じる
			["<Esc>"] = { action = 'close' },
			-- 全折叠
			zM = {
				action = function(finder)
					-- 全ディレクトリを再帰的に折りたたむ
					finder.state:walk(function(node)
						if node.value then
							local entry = finder.state.store[node.value]
							if entry and entry.type == 'directory' then
								finder.state:toggle(entry.path, false)
							end
						end
					end)
					finder:refresh({ recursive = true })
				end,
			},
			-- カーソルノードを折りたたむ
			zc = { action = 'shrink' },
			-- カーソルノードを展開/折りたたみ（トグル）
			za = {
				action = function(finder)
					local entry = require('fyler.finder').parse_cursor_line(finder)
					if not entry then return end
					if entry.type == 'directory' then
						finder.state:toggle(entry.path)
						finder:refresh({ recursive = true })
					else
						finder.state:toggle(entry.path, false)
						finder:refresh({ target_path = vim.fn.fnamemodify(entry.path, ':h') })
					end
				end,
			},
			-- 親ディレクトリへ移動
			["-"] = { action = 'visit', args = { parent = true } },
			-- ファイルを開く / ディレクトリへ移動
			gf = {
				action = function(finder)
					local entry = require('fyler.finder').parse_cursor_line(finder)
					if not entry then return end
					if entry.type == 'directory' then
						finder:visit({ cursor = true })
					else
						finder:select({ close = true })
					end
				end,
			},
			-- カレントディレクトリへ移動
			["="] = {
				action = function(finder)
					finder:visit({ path = vim.fn.getcwd() })
				end,
			},
			-- カーソルノードへ移動
			cx = { action = 'visit', args = { cursor = true } },

			-- 無効化するデフォルトマッピング
			q = { disabled = true },
			["<C-t>"] = { disabled = true },
			["|"] = { disabled = true },
			["^"] = { disabled = true },
			["."] = { disabled = true },
			["#"] = { disabled = true },
			["<BS>"] = { disabled = true },
		},
	},
}

vim.api.nvim_create_autocmd('FileType', { pattern = 'fern', command = 'setl sw=0' })
vim.keymap.set('n', '<c-n>', function() require 'fyler'.toggle { kind = "floating" } end, { desc = "Toggle Fyler View" })
'''

[[plugins]]
repo = "lambdalisue/nerdfont.vim"
[[plugins]]
repo = "lambdalisue/fern-renderer-nerdfont.vim"
depends = "nerdfont.vim"
[[plugins]]
repo = "lambdalisue/fern-git-status.vim"
[[plugins]]
repo = "lambdalisue/fern-mapping-git.vim"
[[plugins]]
repo = "lambdalisue/fern-mapping-project-top.vim"
[[plugins]]
repo = "andykog/fern-highlight.vim"

[[plugins]]
repo = "lambdalisue/vim-fern"
depends = [
	"fern-renderer-nerdfont.vim",
	"fern-git-status.vim",
	"fern-mapping-git.vim",
	"fern-highlight.vim",
]
on_cmd = "Fern"
# TODO: なぜかエラーが出る
# on_map = { n = '<c-n>' }
lua_after = '''
vim.api.nvim_set_var('fern#renderer', 'nerdfont')
vim.api.nvim_set_var('fern#renderer#nerdfont#indent_markers', 1)
vim.api.nvim_create_autocmd('FileType', {
	pattern = 'fern',
	callback = function()
		local opts = { buffer = true }
		vim.keymap.set('n', 'K', '<Plug>(fern-action-new-dir)', { buffer = true, desc = 'Fern: create new dir' })
		vim.keymap.set('n', 'ZZ', '<cmd>close<cr>', { buffer = true, desc = 'Fern: close the buffer' })
		vim.keymap.set('n', 'ZQ', '<cmd>quit<cr>', { buffer = true, desc = 'Fern: quit' })
		vim.opt_local.number = false
	end,
})
vim.fn['fern_git_status#init']()
'''
