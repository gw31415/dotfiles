# fylerがマルチバッファに対応するまでこちらをデフォルトファイラにする
[[plugins]]
repo = "stevearc/oil.nvim"
on_event = "VimEnter"
lua_after = '''
require 'oil'.setup {
	default_file_explorer = true,
	delete_to_trash = true,
	extra_s3_args = { '--region', 'ap-northeast-1' },
}
'''

[[plugins]]
repo = "A7Lavinraj/fyler.nvim@stable"
depends = "mini.icons"
on_cmd = "Fyler"
on_map = { n = '<c-n>' }
lua_after = '''
require 'fyler'.setup {
	extensions = { trash = { enabled = true }, git = { enabled = true } },
	use_as_default_explorer = false,
	integrations = { icon = 'mini_icons' },
	ui = { indent_guides = true },
	mappings = {
		n = {
			-- システムデフォルトアプリで開く
			gx = {
				action = function(finder)
					local entry = require 'fyler.finder'.parse_cursor_line(finder)
					if entry then vim.ui.open(entry.path) end
				end,
			},
			-- 開く（ディレクトリなら展開切替）
			['<CR>'] = { action = 'select', args = { close = true } },
			-- 閉じる
			['<Esc>'] = { action = 'close' },
			-- 全折叠
			zM = {
				action = function(finder)
					-- 全ディレクトリを再帰的に折りたたむ
					finder.state:walk(function(node)
						if node.value then
							local entry = finder.state.store[node.value]
							if entry and entry.type == 'directory' then
								finder.state:toggle(entry.path, false)
							end
						end
					end)
					finder:refresh { recursive = true }
				end,
			},
			-- カーソルノードを折りたたむ
			zc = { action = 'shrink' },
			-- カーソルノードを展開/折りたたみ（トグル）
			za = {
				action = function(finder)
					local entry = require 'fyler.finder'.parse_cursor_line(finder)
					if not entry then return end
					if entry.type == 'directory' then
						finder.state:toggle(entry.path)
						finder:refresh { recursive = true }
					else
						finder.state:toggle(entry.path, false)
						finder:refresh { target_path = vim.fn.fnamemodify(entry.path, ':h') }
					end
				end,
			},
			-- 親ディレクトリへ移動
			['-'] = { action = 'visit', args = { parent = true } },
			-- ファイルを開く / ディレクトリへ移動
			gf = {
				action = function(finder)
					local entry = require 'fyler.finder'.parse_cursor_line(finder)
					if not entry then return end
					if entry.type == 'directory' then
						finder:visit { cursor = true }
					else
						finder:select { close = true }
					end
				end,
			},
			-- 隠しファイルのトグル
			['g.'] = {
				action = 'toggle_ui',
				args = { 'hidden_items' },
			},
			-- カレントディレクトリへ移動
			['='] = {
				action = function(finder)
					finder:visit { path = vim.fn.getcwd() }
				end,
			},
			-- カーソルノードへ移動
			cx = { action = 'visit', args = { cursor = true } },

			['<C-L>'] = {
				action = 'refresh',
				args = { recursive = true, force = true },
			},

			-- 無効化するデフォルトマッピング
			['<2-LeftMouse>'] = { disabled = true },
			['<C-S>'] = { disabled = true },
			['<C-V>'] = { disabled = true },
			['<C-T>'] = { disabled = true },
			['<C-R>'] = { disabled = true },
			['|'] = { disabled = true },
			['^'] = { disabled = true },
			['.'] = { disabled = true },
			['#'] = { disabled = true },
			['<BS>'] = { disabled = true },
			gi = { disabled = true },
			q = { disabled = true },
		},
	},
}

vim.keymap.set('n', '<c-n>', function() require 'fyler'.toggle { kind = 'floating' } end, { desc = 'Toggle Fyler View' })
'''
