name: Publish Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gw31415/ama-home-manager

jobs:
  build-architecture:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      actions: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            nix_system: x86_64-linux
            runner: ubuntu-latest
          - arch: arm64
            nix_system: aarch64-linux
            runner: ubuntu-24.04-arm
    env:
      NIX_SYSTEM: ${{ matrix.nix_system }}
      IMAGE_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            # Needed for "runAsRoot" capability
            system-features = kvm
            extra-experimental-features = nix-command flakes

            keep-env-derivations = true
            keep-outputs = true

      # NOTE: キャッシュ容量のコントロールができないため、Nixキャッシュは一旦無効化
      # - name: Restore and save Nix store
      #   uses: nix-community/cache-nix-action@v7
      #   with:
      #     primary-key: nix-v2-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      #     restore-prefixes-first-match: nix-v2-${{ runner.os }}-${{ matrix.arch }}-
      #     gc-max-store-size-linux: 4G
      #     purge: true
      #     purge-prefixes: |
      #       nix-${{ runner.os }}-${{ matrix.arch }}-
      #       nix-v2-${{ runner.os }}-${{ matrix.arch }}-
      #     purge-created: 0
      #     purge-last-accessed: P1DT12H
      #     purge-primary-key: never

      - name: Build container image
        run: nix build ".#dockerImage"

      - name: Load image into Docker
        run: docker load < result

      - name: Modify image
        run: docker build ./docker -t ama-home-manager:latest

      - name: Tag image based on ref
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          sanitize_ref() {
            printf '%s' "$1" | tr '/:@' '-' | tr -cd '[:alnum:]._-'
          }

          # Tag with branch or tag name if applicable
          if [ "${REF_TYPE}" = "branch" ] || [ "${REF_TYPE}" = "tag" ]; then
            ref_tag="${IMAGE_NAME}:$(sanitize_ref "${REF_NAME}")-${IMAGE_ARCH}"
            docker tag ama-home-manager:latest "${ref_tag}"
          fi

          # Tag as latest if on main branch
          if [ "${REF_NAME}" = "main" ]; then
            docker tag ama-home-manager:latest "${IMAGE_NAME}:latest-${IMAGE_ARCH}"
          fi

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push architecture image
        env:
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          arch_tag="${IMAGE_NAME}:sha-${SHA}-${IMAGE_ARCH}"
          docker tag ama-home-manager:latest "${arch_tag}"
          docker push "${arch_tag}"

  publish-manifest:
    runs-on: ubuntu-latest
    needs:
      - build-architecture
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Create and push multi-arch manifests
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          sanitize_ref() {
            printf '%s' "$1" | tr '/:@' '-' | tr -cd '[:alnum:]._-'
          }

          manifest_sources=(
            "${IMAGE_NAME}:sha-${SHA}-amd64"
            "${IMAGE_NAME}:sha-${SHA}-arm64"
          )

          manifest_targets=("${IMAGE_NAME}:sha-${SHA}")

          if [ "${REF_TYPE}" = "branch" ] || [ "${REF_TYPE}" = "tag" ]; then
            manifest_targets+=("${IMAGE_NAME}:$(sanitize_ref "${REF_NAME}")")
          fi

          if [ "${REF_NAME}" = "main" ]; then
            manifest_targets+=("${IMAGE_NAME}:latest")
          fi

          for target in "${manifest_targets[@]}"; do
            docker manifest rm "${target}" >/dev/null 2>&1 || true
            docker manifest create "${target}" "${manifest_sources[@]}"
            docker manifest push "${target}"
          done
