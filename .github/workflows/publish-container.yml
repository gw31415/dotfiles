name: Publish Container

on:
  # push:
  workflow_dispatch:

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/gw31415/ama-home-manager

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      NIX_SYSTEM: x86_64-linux
      IMAGE_ARCH: amd64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            # Needed for "runAsRoot" capability
            system-features = kvm
            extra-experimental-features = nix-command flakes

      - name: Build container image
        run: nix build ".#dockerImage"

      - name: Load image into Docker
        run: docker load < result

      - name: Materialize mutable container state
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -eu

          image_cmd="$(docker image inspect ama-home-manager:latest --format '{{json .Config.Cmd}}')"
          image_entrypoint="$(docker image inspect ama-home-manager:latest --format '{{json .Config.Entrypoint}}')"
          image_user="$(docker image inspect ama-home-manager:latest --format '{{.Config.User}}')"
          image_workdir="$(docker image inspect ama-home-manager:latest --format '{{.Config.WorkingDir}}')"

          import_args=()
          while IFS= read -r -d '' change; do
            import_args+=(--change "$change")
          done < <(
            docker image inspect ama-home-manager:latest |
              jq -jr '
                .[0].Config.Env[]
                | select(test("[\\n\\r]") | not)
                | "ENV " + . + "\u0000"
              '
          )
          if [ -n "${image_workdir}" ]; then
            import_args+=(--change "WORKDIR ${image_workdir}")
          fi
          if [ -n "${image_user}" ]; then
            import_args+=(--change "USER ${image_user}")
          fi
          if [ "${image_entrypoint}" != "null" ]; then
            import_args+=(--change "ENTRYPOINT ${image_entrypoint}")
          fi
          import_args+=(--change "CMD ${image_cmd}")

          branch=main
          if [ "${REF_TYPE}" = "branch" ]; then
            branch="${REF_NAME}"
          fi

          docker run \
            --name ama-home-manager-bootstrap \
            --volume "${GITHUB_WORKSPACE}:/work:ro" \
            --entrypoint /bin/sh \
            --env HOME_MANAGER_GIT_BRANCH="${branch}" \
            ama-home-manager:latest \
            /work/.github/scripts/bootstrap-published-container.sh

          docker export ama-home-manager-bootstrap \
            | docker import "${import_args[@]}" - ama-home-manager:latest
          docker rm ama-home-manager-bootstrap

          actual_cmd="$(docker image inspect ama-home-manager:latest --format '{{json .Config.Cmd}}')"
          if [ "${actual_cmd}" != "${image_cmd}" ]; then
            echo "unexpected image CMD after flattening import: ${actual_cmd}" >&2
            exit 1
          fi

          docker run \
            --rm \
            --entrypoint /bin/sh \
            ama-home-manager:latest \
            -c '
              set -eu
              test -d "$HOME/.config/home-manager/.git"
              test -f "$HOME/.config/fish/config.fish"
              test -d "$HOME/.local/state/nix/profiles"
            '

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push architecture image
        env:
          SHA: ${{ github.sha }}
        run: |
          set -eu
          arch_tag="${IMAGE_NAME}:sha-${SHA}-${IMAGE_ARCH}"
          docker tag ama-home-manager:latest "${arch_tag}"
          docker push "${arch_tag}"

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    env:
      NIX_SYSTEM: aarch64-linux
      IMAGE_ARCH: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        run: nix build ".#packages.${NIX_SYSTEM}.dockerImage"

      - name: Load image into Docker
        run: docker load < result

      - name: Materialize mutable container state
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -eu

          image_cmd="$(docker image inspect ama-home-manager:latest --format '{{json .Config.Cmd}}')"
          image_entrypoint="$(docker image inspect ama-home-manager:latest --format '{{json .Config.Entrypoint}}')"
          image_user="$(docker image inspect ama-home-manager:latest --format '{{.Config.User}}')"
          image_workdir="$(docker image inspect ama-home-manager:latest --format '{{.Config.WorkingDir}}')"

          import_args=()
          while IFS= read -r -d '' change; do
            import_args+=(--change "$change")
          done < <(
            docker image inspect ama-home-manager:latest |
              jq -jr '
                .[0].Config.Env[]
                | select(test("[\\n\\r]") | not)
                | "ENV " + . + "\u0000"
              '
          )
          if [ -n "${image_workdir}" ]; then
            import_args+=(--change "WORKDIR ${image_workdir}")
          fi
          if [ -n "${image_user}" ]; then
            import_args+=(--change "USER ${image_user}")
          fi
          if [ "${image_entrypoint}" != "null" ]; then
            import_args+=(--change "ENTRYPOINT ${image_entrypoint}")
          fi
          import_args+=(--change "CMD ${image_cmd}")

          branch=main
          if [ "${REF_TYPE}" = "branch" ]; then
            branch="${REF_NAME}"
          fi

          docker run \
            --name ama-home-manager-bootstrap \
            --volume "${GITHUB_WORKSPACE}:/work:ro" \
            --entrypoint /bin/sh \
            --env HOME_MANAGER_GIT_BRANCH="${branch}" \
            ama-home-manager:latest \
            /work/.github/scripts/bootstrap-published-container.sh

          docker export ama-home-manager-bootstrap \
            | docker import "${import_args[@]}" - ama-home-manager:latest
          docker rm ama-home-manager-bootstrap

          actual_cmd="$(docker image inspect ama-home-manager:latest --format '{{json .Config.Cmd}}')"
          if [ "${actual_cmd}" != "${image_cmd}" ]; then
            echo "unexpected image CMD after flattening import: ${actual_cmd}" >&2
            exit 1
          fi

          docker run \
            --rm \
            --entrypoint /bin/sh \
            ama-home-manager:latest \
            -c '
              set -eu
              test -d "$HOME/.config/home-manager/.git"
              test -f "$HOME/.config/fish/config.fish"
              test -d "$HOME/.local/state/nix/profiles"
            '

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push architecture image
        env:
          SHA: ${{ github.sha }}
        run: |
          set -eu
          arch_tag="${IMAGE_NAME}:sha-${SHA}-${IMAGE_ARCH}"
          docker tag ama-home-manager:latest "${arch_tag}"
          docker push "${arch_tag}"

  publish-manifest:
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Create and push multi-arch manifests
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
        run: |
          set -eu
          sanitize_ref() {
            printf '%s' "$1" | tr '/:@' '-' | tr -cd '[:alnum:]._-'
          }

          manifest_sources=(
            "${IMAGE_NAME}:sha-${SHA}-amd64"
            "${IMAGE_NAME}:sha-${SHA}-arm64"
          )

          manifest_targets=("${IMAGE_NAME}:sha-${SHA}")

          if [ "${REF_TYPE}" = "branch" ] || [ "${REF_TYPE}" = "tag" ]; then
            manifest_targets+=("${IMAGE_NAME}:$(sanitize_ref "${REF_NAME}")")
          fi

          if [ "${REF_NAME}" = "main" ]; then
            manifest_targets+=("${IMAGE_NAME}:latest")
          fi

          for target in "${manifest_targets[@]}"; do
            docker manifest rm "${target}" >/dev/null 2>&1 || true
            docker manifest create "${target}" "${manifest_sources[@]}"
            docker manifest push "${target}"
          done
