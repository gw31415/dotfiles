onboarding = false

[terminal]
default_shell = "/run/current-system/sw/bin/fish"

[ui]
show_agent_labels_on_pane_borders = true
switch_ascii_input_source_in_prefix = true
prompt_new_tab_name = false
agent_panel_sort = "priority"
ui.sound.enable = true

[ui.toast]
delivery = "terminal"

[update]
channel = "preview"

[keys]
prefix = "super+b"
detach = ["prefix+q", "super+w"]

# Compose text (e.g. Japanese via SKK) in a small nvim split and send it to the
# previously focused pane when nvim is saved-and-quit (:wq). See `herdr_editor`.
[[keys.command]]
key = "prefix+i"
type = "shell"
command = "fish -c herdr_editor"
description = "compose text to input"

[experimental]
kitty_graphics = true
switch_ascii_input_source_in_prefix = true
